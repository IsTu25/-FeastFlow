events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream identity_srv {
        server identity-provider:3000;
    }

    upstream order_srv {
        server order-gateway:3000;
    }

    upstream stock_srv {
        server stock-service:3000;
    }

    upstream kitchen_srv {
        server kitchen-queue:3000;
    }

    upstream notify_srv {
        server notification-hub:3000;
    }

    upstream dashboard_srv {
        server react-dashboard:5173;
    }

    server {
        listen 80;

        # Identity Provider
        location /api/auth {
            rewrite ^/api/auth/(.*) /$1 break;
            rewrite ^/api/auth$ / break;
            proxy_pass http://identity_srv;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Order Gateway
        location /api/order {
            rewrite ^/api/order/(.*) /$1 break;
            rewrite ^/api/order$ / break;
            proxy_pass http://order_srv;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Stock Service
        location /api/stock {
            rewrite ^/api/stock/(.*) /$1 break;
            rewrite ^/api/stock$ / break;
            proxy_pass http://stock_srv;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Kitchen Queue
        location /api/kitchen {
            rewrite ^/api/kitchen/(.*) /$1 break;
            rewrite ^/api/kitchen$ / break;
            proxy_pass http://kitchen_srv;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Notification Hub
        location /api/notifications {
            rewrite ^/api/notifications/(.*) /$1 break;
            rewrite ^/api/notifications$ / break;
            proxy_pass http://notify_srv;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket support
        location /socket.io {
            proxy_pass http://notify_srv;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Dashboard
        location / {
            proxy_pass http://dashboard_srv;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}

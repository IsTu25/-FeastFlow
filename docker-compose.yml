version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: iut_user
      POSTGRES_PASSWORD: iut_password
      POSTGRES_DB: iut_cafeteria
    ports:
      - "5432:5432"

  identity-provider:
    build: ./identity-provider
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - DB_URL=postgresql://iut_user:iut_password@postgres:5432/iut_cafeteria
      - JWT_SECRET=super_secret_jwt_key
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  stock-service:
    build: ./stock-service
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - DB_URL=postgresql://iut_user:iut_password@postgres:5432/iut_cafeteria
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  order-gateway:
    build: ./order-gateway
    ports:
      - "3003:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=super_secret_jwt_key
      - REDIS_URL=redis://redis:6379
      - STOCK_SERVICE_URL=http://stock-service:3000
      - KITCHEN_QUEUE_URL=http://kitchen-queue:3000
    depends_on:
      - stock-service
      - kitchen-queue
      - redis

  kitchen-queue:
    build: ./kitchen-queue
    ports:
      - "3004:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - NOTIFICATION_HUB_URL=http://notification-hub:3000
    depends_on:
      - redis
      - notification-hub

  notification-hub:
    build: ./notification-hub
    ports:
      - "3005:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  client-ui:
    build:
      context: ./client-ui
    ports:
      - "8080:80"
    depends_on:
      - order-gateway
      - identity-provider
      - notification-hub

  admin-ui:
    build:
      context: ./admin-ui
    ports:
      - "8081:80"
    depends_on:
      - order-gateway
      - stock-service
      - identity-provider
      - kitchen-queue
      - notification-hub

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3006:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - order-gateway
      - identity-provider
      - client-ui

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log
      - ./observability-configs/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml

services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: iut_user
      POSTGRES_PASSWORD: iut_password
      POSTGRES_DB: iut_cafeteria
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"

  identity-provider:
    build: ./identity-provider
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - DB_URL=postgresql://iut_user:iut_password@postgres:5432/iut_cafeteria
      - JWT_SECRET=super_secret_jwt_key
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=identity-provider
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - postgres
      - redis

  stock-service:
    build: ./stock-service
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - DB_URL=postgresql://iut_user:iut_password@postgres:5432/iut_cafeteria
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=stock-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - postgres
      - redis

  order-gateway:
    build: ./order-gateway
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=super_secret_jwt_key
      - REDIS_URL=redis://redis:6379
      - STOCK_SERVICE_URL=http://stock-service:3000
      - KITCHEN_QUEUE_URL=http://kitchen-queue:3000
      - NOTIFICATION_HUB_URL=http://notification-hub:3000
      - SERVICE_NAME=order-gateway
      - DB_URL=postgresql://iut_user:iut_password@postgres:5432/iut_cafeteria
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - stock-service
      - kitchen-queue
      - redis

  kitchen-queue:
    build: ./kitchen-queue
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - NOTIFICATION_HUB_URL=http://notification-hub:3000
      - SERVICE_NAME=kitchen-queue
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - redis
      - notification-hub

  notification-hub:
    build: ./notification-hub
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=notification-hub
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - redis

  react-dashboard:
    build:
      context: ./react-dashboard
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./react-dashboard:/app
      - /app/node_modules
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3006:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - order-gateway
      - identity-provider

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    volumes:
      - /var/log:/var/log
      - ./observability-configs/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-queue
  labels:
    app: kitchen-queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-queue
  template:
    metadata:
      labels:
        app: kitchen-queue
    spec:
      containers:
      - name: kitchen-queue
        image: iut-cafeteria/kitchen-queue:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: NOTIFICATION_HUB_URL
          value: "http://notification-hub:3000"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: feastflow-secrets
              key: REDIS_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kitchen-queue
spec:
  selector:
    app: kitchen-queue
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
